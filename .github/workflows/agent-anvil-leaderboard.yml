name: Agent Anvil Leaderboard Submission

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write
  attestations: write

env:
  PYTHONPATH: ${{ github.workspace }}
  ANVIL_RESULTS_JSON: docs/paper/results.json
  ANVIL_MANIFEST: experiments/paper.yaml
  ANVIL_AGENT_NAME: Agent Anvil Demo Agent
  LEADERBOARD_REPO: agent-axiom/agent-anvil-leaderboard

jobs:
  leaderboard-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Run Agent Anvil benchmark
        run: |
          uvx --from git+https://github.com/agent-axiom/agent-anvil@v0.2.23 \
            anvil paper reproduce \
            --manifest "$ANVIL_MANIFEST"

      - name: Export GitHub Actions leaderboard submission
        run: |
          uvx --from git+https://github.com/agent-axiom/agent-anvil@v0.2.23 \
            anvil leaderboard export "$ANVIL_RESULTS_JSON" \
            --manifest "$ANVIL_MANIFEST" \
            --out leaderboard_submission.json \
            --agent-name "$ANVIL_AGENT_NAME" \
            --agent-version "${{ github.sha }}" \
            --repo-url "${{ github.server_url }}/${{ github.repository }}" \
            --commit-sha "${{ github.sha }}"

      - name: Validate GitHub Actions trust metadata
        run: |
          uvx --from git+https://github.com/agent-axiom/agent-anvil@v0.2.23 \
            anvil leaderboard validate leaderboard_submission.json \
            --require-trust github_actions

      - name: Attest leaderboard submission
        uses: actions/attest@v4
        with:
          subject-path: leaderboard_submission.json

      - name: Prepare submission artifact
        run: |
          mkdir -p submission
          submission_name="$(echo "${GITHUB_REPOSITORY}" | tr '/[:upper:]' '-[:lower:]')"
          cp leaderboard_submission.json "submission/${submission_name}.json"
          {
            echo "## Agent Anvil leaderboard submission"
            echo
            echo "Trust level: github_actions"
            echo "Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Open a pull request that adds:"
            echo
            echo "\`\`\`text"
            echo "submissions/${submission_name}.json"
            echo "\`\`\`"
            echo
            echo "Destination repo: https://github.com/agent-axiom/agent-anvil-leaderboard"
            echo
            echo "Verify provenance after download:"
            echo
            echo "\`\`\`bash"
            echo "gh attestation verify leaderboard_submission.json -R ${GITHUB_REPOSITORY}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check out public leaderboard
        uses: actions/checkout@v6
        with:
          repository: agent-axiom/agent-anvil-leaderboard
          path: leaderboard-repo
          token: ${{ secrets.LEADERBOARD_PR_TOKEN }}

      - name: Prepare leaderboard PR file and body
        run: |
          uvx --from git+https://github.com/agent-axiom/agent-anvil@v0.2.23 \
            anvil leaderboard pr leaderboard_submission.json \
            --leaderboard-repo leaderboard-repo \
            --require-trust github_actions \
            --pr-body-out agent-anvil-leaderboard-pr.md \
            --force

      - name: Open leaderboard pull request
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_PR_TOKEN }}
        run: |
          cd leaderboard-repo
          submission_name="$(echo "${GITHUB_REPOSITORY}" | tr '/[:upper:]' '-[:lower:]')"
          branch="add-${submission_name}-submission-${GITHUB_RUN_ID}"
          git config user.name "agent-anvil-bot"
          git config user.email "agent-anvil-bot@users.noreply.github.com"
          git checkout -b "$branch"
          git add submissions
          git commit -m "Refresh ${submission_name} leaderboard submission"
          git push --set-upstream origin "$branch"
          gh pr create \
            --repo "$LEADERBOARD_REPO" \
            --head "$branch" \
            --title "Refresh ${ANVIL_AGENT_NAME} leaderboard submission" \
            --body-file ../agent-anvil-leaderboard-pr.md

      - uses: actions/upload-artifact@v7
        with:
          name: agent-anvil-leaderboard-submission
          path: |
            leaderboard_submission.json
            submission/*.json
            agent-anvil-leaderboard-pr.md
