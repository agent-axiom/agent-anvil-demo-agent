name: Agent Anvil Leaderboard Submission

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  PYTHONPATH: ${{ github.workspace }}
  ANVIL_RESULTS_JSON: docs/paper/results.json
  ANVIL_MANIFEST: experiments/paper.yaml
  ANVIL_AGENT_NAME: Agent Anvil Demo Agent

jobs:
  leaderboard-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Run Agent Anvil benchmark
        run: |
          uvx --from git+https://github.com/agent-axiom/agent-anvil \
            anvil paper reproduce \
            --manifest "$ANVIL_MANIFEST"

      - name: Export GitHub Actions leaderboard submission
        run: |
          uvx --from git+https://github.com/agent-axiom/agent-anvil \
            anvil leaderboard export "$ANVIL_RESULTS_JSON" \
            --manifest "$ANVIL_MANIFEST" \
            --out leaderboard_submission.json \
            --agent-name "$ANVIL_AGENT_NAME" \
            --agent-version "${{ github.sha }}" \
            --repo-url "${{ github.server_url }}/${{ github.repository }}" \
            --commit-sha "${{ github.sha }}"

      - name: Validate GitHub Actions trust metadata
        run: |
          uvx --from git+https://github.com/agent-axiom/agent-anvil \
            anvil leaderboard validate leaderboard_submission.json \
            --require-trust github_actions

      - name: Prepare submission artifact
        run: |
          mkdir -p submission
          submission_name="$(echo "${GITHUB_REPOSITORY}" | tr '/[:upper:]' '-[:lower:]')"
          cp leaderboard_submission.json "submission/${submission_name}.json"
          {
            echo "## Agent Anvil leaderboard submission"
            echo
            echo "Trust level: github_actions"
            echo "Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Open a pull request that adds:"
            echo
            echo "\`\`\`text"
            echo "submissions/${submission_name}.json"
            echo "\`\`\`"
            echo
            echo "Destination repo: https://github.com/agent-axiom/agent-anvil-leaderboard"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        with:
          name: agent-anvil-leaderboard-submission
          path: submission/*.json
